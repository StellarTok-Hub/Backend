repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-yaml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.6
    hooks:
      - id: ruff
        name: ruff check (analytics-service)
        args: [--fix]
        files: ^services/analytics-service/
      - id: ruff-format
        name: ruff format (analytics-service)
        files: ^services/analytics-service/

  # Node tooling runs via `language: system` (the project's own installed
  # eslint/prettier) rather than a pre-commit-managed mirror, so local runs
  # match `npm run lint` / CI exactly instead of drifting from a second
  # toolchain. Requires `npm install` to have been run in services/gateway.
  - repo: local
    hooks:
      - id: gateway-eslint
        name: eslint (gateway)
        entry: bash -c 'cd services/gateway && npx eslint src tests --ext .ts'
        language: system
        files: ^services/gateway/(src|tests)/.*\.ts$
        pass_filenames: false
      - id: gateway-prettier
        name: prettier (gateway)
        entry: bash -c 'cd services/gateway && npx prettier --check "src/**/*.ts" "tests/**/*.ts"'
        language: system
        files: ^services/gateway/(src|tests)/.*\.ts$
        pass_filenames: false
